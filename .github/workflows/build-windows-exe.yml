name: CI + Windows Release

on:
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-html pytest-qt pyinstaller

      - name: Run tests (HTML report)
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest --html=pytest-report.html --self-contained-html
          $code = $LASTEXITCODE
          Set-Content -Path .pytest_exitcode -Value $code

      - name: Upload pytest HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.html
          if-no-files-found: ignore

      - name: Upload app logs (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: logs/
          if-no-files-found: ignore

      - name: Fail build if tests failed
        if: always()
        shell: pwsh
        run: |
          $code = [int](Get-Content .pytest_exitcode)
          if ($code -ne 0) {
            Write-Host "Pytest failed with exit code $code"
            exit $code
          }

      - name: Build EXE (PyInstaller)
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --icon=assets/icon.ico --name AkihabaraiScore app/main.py

      - name: Smoke test EXE startup
        if: always()
        shell: pwsh
        run: |
          $exe = "dist\AkihabaraiScore.exe"
          $report = "exe-smoke-report.json"

          $data = @{
            timestamp = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
            workflow = "${{ github.workflow }}"
            run_id = "${{ github.run_id }}"
            run_number = "${{ github.run_number }}"
            ref = "${{ github.ref }}"
            sha = "${{ github.sha }}"
            exe_path = $exe
            exe_exists = $false
            process_started = $false
            pid = $null
            startup_wait_seconds = 5
            has_exited_early = $false
            exit_code = $null
            result = "FAIL"
            reason = ""
            error = $null
          }

          try {
            if (Test-Path $exe) {
              $data.exe_exists = $true
            }
            else {
              $data.reason = "EXE not found"
              $data | ConvertTo-Json -Depth 5 | Set-Content $report
              Write-Error "EXE not found: $exe"
              exit 1
            }

            $proc = Start-Process -FilePath $exe -PassThru
            $data.process_started = $true
            $data.pid = $proc.Id

            Start-Sleep -Seconds 5

            if ($proc.HasExited) {
              $data.has_exited_early = $true
              $data.exit_code = $proc.ExitCode
              $data.reason = "EXE exited too early"
              $data.result = "FAIL"
              $data | ConvertTo-Json -Depth 5 | Set-Content $report
              Write-Error "EXE exited too early with code $($proc.ExitCode)"
              exit 1
            }

            Stop-Process -Id $proc.Id -Force

            $data.result = "PASS"
            $data.reason = "EXE stayed alive for 5 seconds and was stopped by smoke test"
            $data | ConvertTo-Json -Depth 5 | Set-Content $report

            Write-Host "EXE startup smoke passed"
          }
          catch {
            $data.error = $_.Exception.Message
            if ([string]::IsNullOrWhiteSpace($data.reason)) {
              $data.reason = "Exception during smoke test"
            }
            $data.result = "FAIL"
            $data | ConvertTo-Json -Depth 5 | Set-Content $report
            throw
          }

      - name: Upload EXE smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exe-smoke-report
          path: exe-smoke-report.json
          if-no-files-found: ignore

      - name: Assemble portable folder
        run: |
          if (Test-Path release) { Remove-Item -Recurse -Force release }
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item dist\AkihabaraiScore.exe release\AkihabaraiScore.exe
          Copy-Item -Recurse -Force config release\config
          Copy-Item -Recurse -Force assets release\assets

      - name: Zip portable package
        run: |
          powershell -Command "Compress-Archive -Path release\* -DestinationPath AkihabaraiScore-windows.zip -Force"

      - name: Upload artifact (main branch builds only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: AkihabaraiScore-windows
          path: release

      - name: Create GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AkihabaraiScore-windows.zip